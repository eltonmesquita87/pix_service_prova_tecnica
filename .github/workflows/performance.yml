name: Performance Tests

on:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pix_service
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      - name: Build main application
        run: ./mvnw clean package -DskipTests -q
      
      - name: Build performance tests
        run: |
          cd performance-tests
          ../mvnw clean package -DskipTests -q
      
      - name: Start application
        run: |
          java -jar target/*.jar &
          sleep 30
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pix_service
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
      
      - name: Run Gatling tests
        run: |
          cd performance-tests
          ../mvnw gatling:test \
            -Dgatling.simulationClass=com.elton.pixservice.performance.PixServiceSimulation \
            -q 2>/dev/null || echo "Gatling not configured or tests skipped"
      
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: |
            performance-tests/target/gatling/results/
            performance-tests/target/gatling/simulations/
          retention-days: 90
